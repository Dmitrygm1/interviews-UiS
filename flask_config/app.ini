[uwsgi]
chdir = /app/
chmod-socket = 666
master = true
module = app:app
socket = /config/app.sock
listen = 512          # queue short synchronized submit bursts instead of returning 502
workers = 48          # maximum number of workers
cheaper-algo = busyness
cheaper = 16          # tries to keep 16 idle workers
cheaper-initial = 16  # starts with a larger warm worker pool for bursts
cheaper-step = 4      # spawn at most 4 workers at once
cheaper-idle = 60     # cheap one worker per minute while idle
